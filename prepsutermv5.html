<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SUTERM 2024 | Sistema de Resultados Preliminares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { opacity: 0.5; }
        .discrep-row { background-color: #fee2e2 !important; }
    </style>
</head>
<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">
    // ============================================================
    // DATOS DE SECCIONES
    // ============================================================
    const SECCIONES = {
        "9": { nombre: "Sección 9", padron: 150 },
        "11": { nombre: "Sección 11", padron: 164 },
        "35": { nombre: "Sección 35", padron: 93 },
        "1": { nombre: "Sección 1", padron: 355 },
        "2": { nombre: "Sección 2", padron: 251 },
        "7": { nombre: "Sección 7", padron: 389 }
    };

    // ============================================================
    // RESULTADOS REALES (BASE)
    // ============================================================
    // Nacional: Planillas Azul, Roja, Otros
    const RESULTADOS_NACIONALES = {
        "9": { azul: 39, roja: 33, otros: 46, nulos: 32 },
        "11": { azul: 97, roja: 33, otros: 21, nulos: 13 },
        "35": { azul: 49, roja: 34, otros: 8, nulos: 2 },
        "1": { azul: 180, roja: 200, otros: 50, nulos: 12 },
        "2": { azul: 122, roja: 51, otros: 30, nulos: 48 },
        "7": { azul: 48, roja: 62, otros: 111, nulos: 48 }
    };

    // Local: Planillas Azul, Roja, Amarilla, Otros
    const RESULTADOS_LOCALES = {
        "9": { azul: 55, roja: 40, amarilla: 30, otros: 15, nulos: 10 },
        "11": { azul: 80, roja: 45, amarilla: 20, otros: 10, nulos: 9 },
        "35": { azul: 30, roja: 25, amarilla: 20, otros: 8, nulos: 10 },
        "1": { azul: 100, roja: 80, amarilla: 150, otros: 20, nulos: 5 },
        "2": { azul: 90, roja: 60, amarilla: 40, otros: 30, nulos: 31 },
        "7": { azul: 70, roja: 55, amarilla: 180, otros: 40, nulos: 44 }
    };

    // ============================================================
    // CLAVES DE ACCESO (SOBRES)
    // ============================================================
    const CLAVES_ACCESO = {
        // Nacional
        "CAEL_NAC_9": { pass: "suterm9", perfil: "cael", tipo: "nacional", seccion: "9" },
        "AZUL_NAC_9": { pass: "suterm9", perfil: "planilla", planilla: "azul", tipo: "nacional", seccion: "9" },
        "ROJA_NAC_9": { pass: "suterm9", perfil: "planilla", planilla: "roja", tipo: "nacional", seccion: "9" },
        "OBS_NAC_9": { pass: "suterm9", perfil: "observador", tipo: "nacional", seccion: "9" },
        "CAEL_NAC_1": { pass: "suterm1", perfil: "cael", tipo: "nacional", seccion: "1" },
        "AZUL_NAC_1": { pass: "suterm1", perfil: "planilla", planilla: "azul", tipo: "nacional", seccion: "1" },
        "ROJA_NAC_1": { pass: "suterm1", perfil: "planilla", planilla: "roja", tipo: "nacional", seccion: "1" },
        "CAEL_NAC_35": { pass: "suterm35", perfil: "cael", tipo: "nacional", seccion: "35" },
        "AZUL_NAC_35": { pass: "suterm35", perfil: "planilla", planilla: "azul", tipo: "nacional", seccion: "35" },
        "ROJA_NAC_35": { pass: "suterm35", perfil: "planilla", planilla: "roja", tipo: "nacional", seccion: "35" },
        // Local
        "CAEL_LOC_35": { pass: "local35", perfil: "cael", tipo: "local", seccion: "35" },
        "AZUL_LOC_35": { pass: "local35", perfil: "planilla", planilla: "azul", tipo: "local", seccion: "35" },
        "ROJA_LOC_35": { pass: "local35", perfil: "planilla", planilla: "roja", tipo: "local", seccion: "35" },
        "AMARILLA_LOC_35": { pass: "local35", perfil: "planilla", planilla: "amarilla", tipo: "local", seccion: "35" },
        "OBS_LOC_35": { pass: "local35", perfil: "observador", tipo: "local", seccion: "35" },
        "CAEL_LOC_9": { pass: "local9", perfil: "cael", tipo: "local", seccion: "9" },
        "AZUL_LOC_9": { pass: "local9", perfil: "planilla", planilla: "azul", tipo: "local", seccion: "9" },
        "ROJA_LOC_9": { pass: "local9", perfil: "planilla", planilla: "roja", tipo: "local", seccion: "9" },
        "AMARILLA_LOC_9": { pass: "local9", perfil: "planilla", planilla: "amarilla", tipo: "local", seccion: "9" },
        "CAEL_LOC_1": { pass: "local1", perfil: "cael", tipo: "local", seccion: "1" },
        "AZUL_LOC_1": { pass: "local1", perfil: "planilla", planilla: "azul", tipo: "local", seccion: "1" },
        "ROJA_LOC_1": { pass: "local1", perfil: "planilla", planilla: "roja", tipo: "local", seccion: "1" },
        "AMARILLA_LOC_1": { pass: "local1", perfil: "planilla", planilla: "amarilla", tipo: "local", seccion: "1" }
    };

    // ============================================================
    // ESTADO INICIAL DE CAPTURAS (CON DISCREPANCIAS)
    // ============================================================
    const construirEstadoInicial = () => {
        let estado = { nacional: {}, local: {} };
        for (let sec in SECCIONES) {
            // Nacional
            estado.nacional[sec] = {
                cael: { ...RESULTADOS_NACIONALES[sec] },
                planillas: {
                    azul: { ...RESULTADOS_NACIONALES[sec] },
                    roja: { ...RESULTADOS_NACIONALES[sec] }
                },
                observador: { ...RESULTADOS_NACIONALES[sec] }
            };
            // Local
            estado.local[sec] = {
                cael: { ...RESULTADOS_LOCALES[sec] },
                planillas: {
                    azul: { ...RESULTADOS_LOCALES[sec] },
                    roja: { ...RESULTADOS_LOCALES[sec] },
                    amarilla: { ...RESULTADOS_LOCALES[sec] }
                },
                observador: { ...RESULTADOS_LOCALES[sec] }
            };
        }
        // DISCREPANCIAS INTENCIONALES (evidentes)
        estado.nacional["9"].planillas.azul.azul = 100;
        estado.nacional["35"].cael.otros = 20;
        estado.local["1"].planillas.amarilla.amarilla = 200;
        estado.local["7"].observador.roja = 80;
        return estado;
    };

    // ============================================================
    // FUNCIONES PARA OBTENER FILAS DE AUDITORÍA
    // ============================================================
    const obtenerFilasNacional = (data) => {
        let filas = [];
        for (let sec in SECCIONES) {
            const d = data.nacional[sec];
            const hayDiscrep = (d.cael.azul !== d.planillas.azul.azul || 
                               d.cael.azul !== d.planillas.roja.azul ||
                               d.cael.roja !== d.planillas.azul.roja ||
                               d.cael.roja !== d.planillas.roja.roja);
            filas.push({
                sec, nombre: SECCIONES[sec].nombre, padron: SECCIONES[sec].padron,
                cael: d.cael, azul: d.planillas.azul, roja: d.planillas.roja,
                obs: d.observador, hayDiscrep
            });
        }
        return filas;
    };

    const obtenerFilasLocal = (data) => {
        let filas = [];
        for (let sec in SECCIONES) {
            const d = data.local[sec];
            const hayDiscrep = (d.cael.azul !== d.planillas.azul.azul ||
                               d.cael.amarilla !== d.planillas.amarilla.amarilla);
            filas.push({
                sec, nombre: SECCIONES[sec].nombre, padron: SECCIONES[sec].padron,
                cael: d.cael, azul: d.planillas.azul, roja: d.planillas.roja,
                amarilla: d.planillas.amarilla, obs: d.observador, hayDiscrep
            });
        }
        return filas;
    };

    // ============================================================
    // COMPONENTE PRINCIPAL
    // ============================================================
    const App = () => {
        const [pestania, setPestania] = React.useState("acceso");
        const [sesion, setSesion] = React.useState(null);
        const [errorLogin, setErrorLogin] = React.useState("");
        const [data, setData] = React.useState(construirEstadoInicial());
        const [busquedaLocal, setBusquedaLocal] = React.useState("");

        const auditoriaNacional = obtenerFilasNacional(data);
        const auditoriaLocal = obtenerFilasLocal(data);

        // Cómputos nacionales
        const totalNacional = auditoriaNacional.reduce((acc, row) => {
            acc.azul += row.cael.azul;
            acc.roja += row.cael.roja;
            acc.otros += row.cael.otros;
            acc.nulos += row.cael.nulos;
            acc.padron += row.padron;
            return acc;
        }, { azul: 0, roja: 0, otros: 0, nulos: 0, padron: 0 });

        const ganadorNacional = (() => {
            const { azul, roja, otros } = totalNacional;
            if (azul > roja && azul > otros) return "Planilla AZUL";
            if (roja > azul && roja > otros) return "Planilla ROJA";
            if (otros > azul && otros > roja) return "OTROS";
            return "Empate";
        })();

        const seccionEncontrada = auditoriaLocal.find(r => r.sec === busquedaLocal);

        // Login
        const handleLogin = (e) => {
            e.preventDefault();
            const usuario = e.target.usuario.value;
            const pass = e.target.password.value;
            const clave = CLAVES_ACCESO[usuario];
            if (clave && clave.pass === pass) {
                setSesion(clave);
                setErrorLogin("");
                setPestania("captura");
            } else {
                setErrorLogin("Claves de acceso incorrectas. Verifique su sobre.");
            }
        };

        const cerrarSesion = () => {
            setSesion(null);
            setPestania("acceso");
        };

        // ============================================================
        // RENDERIZADO DE PESTAÑAS
        // ============================================================
        const renderAcceso = () => (
            <div className="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl border-t-8 border-red-700">
                <div className="bg-gray-900 p-5 text-center rounded-t-xl">
                    <h1 className="text-3xl font-bold text-white">SUTERM</h1>
                    <p className="text-red-400">Resultados Preliminares 2024</p>
                    <p className="text-gray-500 text-xs">Acceso con sus claves (contenidas en el sobre)</p>
                </div>
                <form onSubmit={handleLogin} className="p-7">
                    <label className="font-semibold text-gray-700">Usuario</label>
                    <input type="text" name="usuario" className="w-full border rounded p-2 mt-1 mb-4" required />
                    <label className="font-semibold text-gray-700">Contraseña</label>
                    <input type="password" name="password" className="w-full border rounded p-2 mt-1 mb-4" required />
                    {errorLogin && <div className="text-red-600 text-sm mb-4 bg-red-50 p-2 rounded">{errorLogin}</div>}
                    <button type="submit" className="w-full bg-red-800 text-white py-2 rounded hover:bg-red-900">Ingresar al sistema</button>
                    <div className="mt-6 text-xs text-gray-500 bg-gray-50 p-3 rounded">
                        <p className="font-bold text-gray-700">🔑 Claves de ejemplo:</p>
                        <ul className="list-disc pl-4 mt-1">
                            <li><strong>CAEL_NAC_9</strong> / suterm9 → Comisión Nacional Sección 9</li>
                            <li><strong>AZUL_NAC_1</strong> / suterm1 → Planilla Azul Nacional Sección 1</li>
                            <li><strong>AMARILLA_LOC_35</strong> / local35 → Planilla Amarilla Local Sección 35</li>
                            <li><strong>OBS_LOC_35</strong> / local35 → Observador Local Sección 35</li>
                        </ul>
                    </div>
                </form>
            </div>
        );

        const renderAuditoria = () => (
            <div className="bg-white rounded-xl shadow-lg p-5 overflow-x-auto">
                <h2 className="text-2xl font-bold mb-4 text-gray-800">🔍 Auditoría: Triple validación por figuras</h2>
                
                {/* TABLA NACIONAL */}
                <div className="mb-8">
                    <h3 className="font-bold text-lg bg-gray-100 p-2 mb-3 rounded">🗳️ Elección NACIONAL (Planillas: Azul, Roja)</h3>
                    <table className="min-w-[1000px] w-full text-sm border">
                        <thead className="bg-gray-800 text-white">
                            <tr><th className="p-2">Sección</th><th>Actor</th><th>Azul</th><th>Roja</th><th>Otros</th><th>Nulos</th><th>Estado</th></tr>
                        </thead>
                        <tbody>
                            {auditoriaNacional.map(row => {
                                const actores = [
                                    { nombre: "CAEL", data: row.cael },
                                    { nombre: "Planilla AZUL", data: row.azul },
                                    { nombre: "Planilla ROJA", data: row.roja },
                                    { nombre: "Observador", data: row.obs }
                                ];
                                return actores.map((actor, idx) => (
                                    <tr key={`nac-${row.sec}-${idx}`} className={row.hayDiscrep && idx === 0 ? "discrep-row" : ""}>
                                        {idx === 0 && <td rowSpan={4} className="border p-2 align-middle font-bold bg-gray-50">{row.nombre}<br/><span className="text-xs font-normal">Padrón: {row.padron}</span></td>}
                                        <td className="border p-2">{actor.nombre}</td>
                                        <td className="border p-2 text-center">{actor.data.azul}</td>
                                        <td className="border p-2 text-center">{actor.data.roja}</td>
                                        <td className="border p-2 text-center">{actor.data.otros}</td>
                                        <td className="border p-2 text-center">{actor.data.nulos}</td>
                                        <td className="border p-2 text-center text-xs">
                                            {idx === 0 && row.hayDiscrep && <span className="text-red-700 font-bold">⚠️ Discrepancia</span>}
                                            {idx === 0 && !row.hayDiscrep && <span className="text-green-600">✅ Coincide</span>}
                                        </td>
                                    </tr>
                                ));
                            })}
                        </tbody>
                    </table>
                </div>

                {/* TABLA LOCAL */}
                <div>
                    <h3 className="font-bold text-lg bg-gray-100 p-2 mb-3 rounded">🏘️ Elección LOCAL (Planillas: Azul, Roja, Amarilla)</h3>
                    <table className="min-w-[1200px] w-full text-sm border">
                        <thead className="bg-gray-800 text-white">
                            <tr><th className="p-2">Sección</th><th>Actor</th><th>Azul</th><th>Roja</th><th>Amarilla</th><th>Otros</th><th>Nulos</th><th>Estado</th></tr>
                        </thead>
                        <tbody>
                            {auditoriaLocal.map(row => {
                                const actores = [
                                    { nombre: "CAEL", data: row.cael },
                                    { nombre: "Planilla AZUL", data: row.azul },
                                    { nombre: "Planilla ROJA", data: row.roja },
                                    { nombre: "Planilla AMARILLA", data: row.amarilla },
                                    { nombre: "Observador", data: row.obs }
                                ];
                                return actores.map((actor, idx) => (
                                    <tr key={`loc-${row.sec}-${idx}`} className={row.hayDiscrep && idx === 0 ? "discrep-row" : ""}>
                                        {idx === 0 && <td rowSpan={5} className="border p-2 align-middle font-bold bg-gray-50">{row.nombre}<br/><span className="text-xs font-normal">Padrón: {row.padron}</span></td>}
                                        <td className="border p-2">{actor.nombre}</td>
                                        <td className="border p-2 text-center">{actor.data.azul || 0}</td>
                                        <td className="border p-2 text-center">{actor.data.roja || 0}</td>
                                        <td className="border p-2 text-center">{actor.data.amarilla || 0}</td>
                                        <td className="border p-2 text-center">{actor.data.otros || 0}</td>
                                        <td className="border p-2 text-center">{actor.data.nulos || 0}</td>
                                        <td className="border p-2 text-center text-xs">
                                            {idx === 0 && row.hayDiscrep && <span className="text-red-700 font-bold">⚠️ Discrepancia</span>}
                                            {idx === 0 && !row.hayDiscrep && <span className="text-green-600">✅ Coincide</span>}
                                        </td>
                                    </tr>
                                ));
                            })}
                        </tbody>
                    </table>
                </div>
                <p className="text-xs text-gray-500 mt-4">* Las filas con fondo rojo indican discrepancias entre CAEL, planillas y observador.</p>
            </div>
        );

        const renderResultados = () => (
            <div className="space-y-6">
                <div className="bg-white rounded-xl shadow-lg p-6">
                    <h2 className="text-2xl font-bold border-l-8 border-red-700 pl-3 text-gray-800">📊 Resultados NACIONALES</h2>
                    <p className="mt-2 text-gray-700"><span className="font-bold">Ganador por mayoría relativa:</span> {ganadorNacional}</p>
                    <div className="grid md:grid-cols-2 gap-4 mt-4">
                        <div>
                            <span className="font-semibold">🔵 AZUL: {totalNacional.azul} votos</span>
                            <div className="w-full bg-gray-200 rounded-full h-2 mt-1">
                                <div className="bg-blue-700 h-2 rounded-full" style={{width: `${(totalNacional.azul/(totalNacional.azul+totalNacional.roja+totalNacional.otros+1))*100}%`}}></div>
                            </div>
                        </div>
                        <div>
                            <span className="font-semibold">🔴 ROJA: {totalNacional.roja} votos</span>
                            <div className="w-full bg-gray-200 rounded-full h-2 mt-1">
                                <div className="bg-red-700 h-2 rounded-full" style={{width: `${(totalNacional.roja/(totalNacional.azul+totalNacional.roja+totalNacional.otros+1))*100}%`}}></div>
                            </div>
                        </div>
                        <div><span className="font-semibold">⚪ OTROS: {totalNacional.otros} votos</span></div>
                        <div><span className="font-semibold">📊 Participación: {((totalNacional.azul+totalNacional.roja+totalNacional.otros+totalNacional.nulos)/totalNacional.padron*100).toFixed(1)}%</span></div>
                    </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6">
                    <h3 className="font-bold text-lg text-gray-800">🔎 Resultados LOCALES por Sección</h3>
                    <input 
                        type="text" 
                        placeholder="Número de sección (ej. 1, 9, 35, 7)" 
                        className="border p-2 rounded w-full mt-2" 
                        value={busquedaLocal} 
                        onChange={e => setBusquedaLocal(e.target.value)} 
                    />
                    {seccionEncontrada ? (
                        <div className="mt-4 p-4 bg-gray-50 rounded border">
                            <p className="font-bold text-lg text-gray-800">Sección {seccionEncontrada.sec} - {seccionEncontrada.nombre}</p>
                            <p className="text-gray-600">Padrón: {seccionEncontrada.padron} electores</p>
                            <div className="grid grid-cols-2 gap-2 mt-2">
                                <div>🔵 AZUL: {seccionEncontrada.cael.azul} votos</div>
                                <div>🔴 ROJA: {seccionEncontrada.cael.roja} votos</div>
                                <div>🟡 AMARILLA: {seccionEncontrada.cael.amarilla} votos</div>
                                <div>⚪ OTROS: {seccionEncontrada.cael.otros} votos</div>
                                <div>❌ NULOS: {seccionEncontrada.cael.nulos} votos</div>
                            </div>
                            <p className="mt-3 pt-2 border-t"><span className="font-bold">🏆 Ganador Local:</span> {
                                (() => {
                                    const a = seccionEncontrada.cael.azul;
                                    const r = seccionEncontrada.cael.roja;
                                    const am = seccionEncontrada.cael.amarilla;
                                    const o = seccionEncontrada.cael.otros;
                                    if (a > r && a > am && a > o) return "Planilla AZUL";
                                    if (r > a && r > am && r > o) return "Planilla ROJA";
                                    if (am > a && am > r && am > o) return "Planilla AMARILLA";
                                    if (o > a && o > r && o > am) return "OTROS";
                                    return "EMPATE";
                                })()
                            }</p>
                        </div>
                    ) : busquedaLocal && <p className="text-red-500 mt-2">Sección no encontrada. Intente con: 1, 2, 7, 9, 11, 35</p>}
                </div>
            </div>
        );

        const renderCaptura = () => {
            if (!sesion) return null;
            const esNacional = sesion.tipo === "nacional";
            const esPlanilla = sesion.perfil === "planilla";
            const nombrePlanilla = sesion.planilla ? sesion.planilla.toUpperCase() : "";
            
            // Obtener datos actuales
            let datosActuales = null;
            if (sesion.perfil === "cael") datosActuales = data[sesion.tipo][sesion.seccion].cael;
            else if (sesion.perfil === "planilla") datosActuales = data[sesion.tipo][sesion.seccion].planillas[sesion.planilla];
            else if (sesion.perfil === "observador") datosActuales = data[sesion.tipo][sesion.seccion].observador;
            
            const [formVotos, setFormVotos] = React.useState(datosActuales || { azul: 0, roja: 0, amarilla: 0, otros: 0, nulos: 0 });
            const [errorForm, setErrorForm] = React.useState("");
            const [exitoMsg, setExitoMsg] = React.useState("");
            
            const padronActual = SECCIONES[sesion.seccion]?.padron || 0;
            
            const handleCambio = (campo, valor) => {
                const num = parseInt(valor) || 0;
                const nuevo = { ...formVotos, [campo]: num };
                let suma = nuevo.azul + nuevo.roja + (nuevo.amarilla || 0) + nuevo.otros + nuevo.nulos;
                if (suma > padronActual) setErrorForm(`La suma (${suma}) excede el padrón (${padronActual})`);
                else setErrorForm("");
                setFormVotos(nuevo);
            };
            
            const guardar = () => {
                let suma = formVotos.azul + formVotos.roja + (formVotos.amarilla || 0) + formVotos.otros + formVotos.nulos;
                if (suma > padronActual) return setErrorForm("Corrija la suma");
                setData(prev => {
                    const nuevo = { ...prev };
                    if (sesion.perfil === "cael") nuevo[sesion.tipo][sesion.seccion].cael = { ...formVotos };
                    else if (sesion.perfil === "planilla") nuevo[sesion.tipo][sesion.seccion].planillas[sesion.planilla] = { ...formVotos };
                    else if (sesion.perfil === "observador") nuevo[sesion.tipo][sesion.seccion].observador = { ...formVotos };
                    return nuevo;
                });
                setExitoMsg("✅ Datos guardados correctamente");
                setTimeout(() => setExitoMsg(""), 2000);
            };
            
            return (
                <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex justify-between border-b pb-2 mb-4">
                        <h2 className="text-xl font-bold text-gray-800">📋 Captura - {esNacional ? "Elección NACIONAL" : "Elección LOCAL"} - Sección {sesion.seccion}</h2>
                        <button onClick={cerrarSesion} className="bg-gray-200 px-3 py-1 rounded text-sm">Cerrar sesión</button>
                    </div>
                    <div className="grid md:grid-cols-2 gap-6">
                        <div>

                        </div>
                    </div>
                </div>
            );
        };

                            <button onClick={() => setPestania("auditoria")} className={`px-3 py-1 rounded ${pestania === "auditoria" ? "bg-red-700" : "hover:bg-gray-800"}`}>🔎 Auditoría</button>

                    {pestania === "resultados" && renderResultados()}
                </main>
