<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUTERM 2024 | Sistema de Resultados Preliminares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 0.5; }
        .discrep-row { background-color: #fee2e2 !important; }
    </style>
</head>
<body class="bg-gray-100">
<div id="root"></div>
<script type="text/babel">
const SECCIONES = {
    "9": { nombre: "Sección 9", padron: 150 },
    "11": { nombre: "Sección 11", padron: 164 },
    "35": { nombre: "Sección 35", padron: 93 },
    "1": { nombre: "Sección 1", padron: 355 },
    "2": { nombre: "Sección 2", padron: 251 },
    "7": { nombre: "Sección 7", padron: 389 }
};

const RESULTADOS_NACIONALES = {
    "9": { azul: 39, roja: 33, otros: 46, nulos: 32 },
    "11": { azul: 97, roja: 33, otros: 21, nulos: 13 },
    "35": { azul: 49, roja: 34, otros: 8, nulos: 2 },
    "1": { azul: 180, roja: 200, otros: 50, nulos: 12 },
    "2": { azul: 122, roja: 51, otros: 30, nulos: 48 },
    "7": { azul: 48, roja: 62, otros: 111, nulos: 48 }
};

const RESULTADOS_LOCALES = {
    "9": { azul: 55, roja: 40, amarilla: 30, otros: 15, nulos: 10 },
    "11": { azul: 80, roja: 45, amarilla: 20, otros: 10, nulos: 9 },
    "35": { azul: 30, roja: 25, amarilla: 20, otros: 8, nulos: 10 },
    "1": { azul: 100, roja: 80, amarilla: 150, otros: 20, nulos: 5 },
    "2": { azul: 90, roja: 60, amarilla: 40, otros: 30, nulos: 31 },
    "7": { azul: 70, roja: 55, amarilla: 180, otros: 40, nulos: 44 }
};

const CLAVES_ACCESO = {
    "CAEL_NAC_9": { pass: "suterm9", perfil: "cael", tipo: "nacional", seccion: "9" },
    "AZUL_NAC_9": { pass: "suterm9", perfil: "planilla", planilla: "azul", tipo: "nacional", seccion: "9" },
    "CAEL_NAC_1": { pass: "suterm1", perfil: "cael", tipo: "nacional", seccion: "1" },
    "AZUL_NAC_1": { pass: "suterm1", perfil: "planilla", planilla: "azul", tipo: "nacional", seccion: "1" },
    "CAEL_LOC_35": { pass: "local35", perfil: "cael", tipo: "local", seccion: "35" },
    "AMARILLA_LOC_35": { pass: "local35", perfil: "planilla", planilla: "amarilla", tipo: "local", seccion: "35" },
    "OBS_LOC_35": { pass: "local35", perfil: "observador", tipo: "local", seccion: "35" }
};

const construirEstadoInicial = () => {
    let estado = { nacional: {}, local: {} };
    for (let sec in SECCIONES) {
        estado.nacional[sec] = {
            cael: { ...RESULTADOS_NACIONALES[sec] },
            planillas: { azul: { ...RESULTADOS_NACIONALES[sec] }, roja: { ...RESULTADOS_NACIONALES[sec] } },
            observador: { ...RESULTADOS_NACIONALES[sec] }
        };
        estado.local[sec] = {
            cael: { ...RESULTADOS_LOCALES[sec] },
            planillas: { azul: { ...RESULTADOS_LOCALES[sec] }, roja: { ...RESULTADOS_LOCALES[sec] }, amarilla: { ...RESULTADOS_LOCALES[sec] } },
            observador: { ...RESULTADOS_LOCALES[sec] }
        };
    }
    estado.nacional["9"].planillas.azul.azul = 100;
    estado.nacional["35"].cael.otros = 20;
    estado.local["1"].planillas.amarilla.amarilla = 200;
    return estado;
};

const App = () => {
    const [pestania, setPestania] = React.useState("acceso");
    const [sesion, setSesion] = React.useState(null);
    const [errorLogin, setErrorLogin] = React.useState("");
    const [data, setData] = React.useState(construirEstadoInicial());
    const [busquedaLocal, setBusquedaLocal] = React.useState("");

    const handleLogin = (e) => {
        e.preventDefault();
        const clave = CLAVES_ACCESO[e.target.usuario.value];
        if (clave && clave.pass === e.target.password.value) {
            setSesion(clave);
            setErrorLogin("");
            setPestania("captura");
        } else setErrorLogin("Claves incorrectas");
    };

    const cerrarSesion = () => { setSesion(null); setPestania("acceso"); };

    // Auditoría Nacional
    const auditoriaNacional = Object.keys(SECCIONES).map(sec => {
        const d = data.nacional[sec];
        const hay = (d.cael.azul !== d.planillas.azul.azul);
        return { sec, nombre: SECCIONES[sec].nombre, padron: SECCIONES[sec].padron, cael: d.cael, azul: d.planillas.azul, roja: d.planillas.roja, obs: d.observador, hay };
    });

    // Auditoría Local
    const auditoriaLocal = Object.keys(SECCIONES).map(sec => {
        const d = data.local[sec];
        const hay = (d.cael.azul !== d.planillas.azul.azul);
        return { sec, nombre: SECCIONES[sec].nombre, padron: SECCIONES[sec].padron, cael: d.cael, azul: d.planillas.azul, roja: d.planillas.roja, amarilla: d.planillas.amarilla, obs: d.observador, hay };
    });

    const totalNacional = auditoriaNacional.reduce((acc, row) => {
        acc.azul += row.cael.azul; acc.roja += row.cael.roja; acc.otros += row.cael.otros; acc.nulos += row.cael.nulos; acc.padron += row.padron;
        return acc;
    }, { azul: 0, roja: 0, otros: 0, nulos: 0, padron: 0 });
    const ganadorNacional = (() => {
        const { azul, roja, otros } = totalNacional;
        if (azul > roja && azul > otros) return "Planilla AZUL";
        if (roja > azul && roja > otros) return "Planilla ROJA";
        if (otros > azul && otros > roja) return "OTROS";
        return "Empate";
    })();

    const seccionEncontrada = auditoriaLocal.find(r => r.sec === busquedaLocal);

    return (
        <div>
            <header className="bg-gray-900 text-white shadow-md sticky top-0 z-10">
                <div className="container mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
                    <div className="flex items-center gap-2"><div className="bg-red-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">S</div><span className="font-bold text-xl">SUTERM 2024</span><span className="bg-red-800 text-xs px-2 py-0.5 rounded">Triple Validación</span></div>
                    <div className="flex gap-2 text-sm">
                        <button onClick={() => setPestania("acceso")} className={`px-3 py-1 rounded ${pestania==="acceso"?"bg-red-700":"hover:bg-gray-800"}`}>🔐 Acceso</button>
                        <button onClick={() => sesion ? setPestania("captura") : alert("Inicie sesión")} className={`px-3 py-1 rounded ${pestania==="captura"?"bg-red-700":"hover:bg-gray-800"}`}>📋 Capturar</button>
                        <button onClick={() => setPestania("auditoria")} className={`px-3 py-1 rounded ${pestania==="auditoria"?"bg-red-700":"hover:bg-gray-800"}`}>🔎 Auditoría</button>
                        <button onClick={() => setPestania("resultados")} className={`px-3 py-1 rounded ${pestania==="resultados"?"bg-red-700":"hover:bg-gray-800"}`}>📊 Resultados</button>
                    </div>
                    {sesion && <div className="text-xs bg-gray-800 px-2 py-1 rounded">👤 {sesion.perfil} - {sesion.tipo} - Sec {sesion.seccion}</div>}
                </div>
            </header>
            <main className="container mx-auto p-4 mt-4">
                {pestania === "acceso" && (
                    <div className="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl border-t-8 border-red-700">
                        <div className="bg-gray-900 p-5 text-center rounded-t-xl"><h1 className="text-3xl font-bold text-white">SUTERM</h1><p className="text-red-400">Resultados Preliminares 2024</p><p className="text-gray-500 text-xs">Acceso con sus claves (contenidas en el sobre)</p></div>
                        <form onSubmit={handleLogin} className="p-7">
                            <label className="font-semibold text-gray-700">Usuario</label>
                            <input type="text" name="usuario" className="w-full border rounded p-2 mt-1 mb-4" required />
                            <label className="font-semibold text-gray-700">Contraseña</label>
                            <input type="password" name="password" className="w-full border rounded p-2 mt-1 mb-4" required />
                            {errorLogin && <div className="text-red-600 text-sm mb-4 bg-red-50 p-2 rounded">{errorLogin}</div>}
                            <button type="submit" className="w-full bg-red-800 text-white py-2 rounded hover:bg-red-900">Ingresar al sistema</button>
                            <div className="mt-6 text-xs text-gray-500 bg-gray-50 p-3 rounded"><p className="font-bold text-gray-700">🔑 Claves de ejemplo:</p><ul className="list-disc pl-4 mt-1"><li><strong>CAEL_NAC_9</strong> / suterm9 → Comisión Nacional Sección 9</li><li><strong>AZUL_NAC_1</strong> / suterm1 → Planilla Azul Nacional Sección 1</li><li><strong>AMARILLA_LOC_35</strong> / local35 → Planilla Amarilla Local Sección 35</li><li><strong>OBS_LOC_35</strong> / local35 → Observador Local Sección 35</li></ul></div>
                        </form>
                    </div>
                )}
                {pestania === "resultados" && (
                    <div className="space-y-6">
                        <div className="bg-white rounded-xl shadow-lg p-6"><h2 className="text-2xl font-bold border-l-8 border-red-700 pl-3">📊 Resultados NACIONALES</h2><p className="mt-2"><strong>Ganador:</strong> {ganadorNacional}</p><div className="grid md:grid-cols-2 gap-4 mt-4"><div>🔵 AZUL: {totalNacional.azul} votos</div><div>🔴 ROJA: {totalNacional.roja} votos</div><div>⚪ OTROS: {totalNacional.otros} votos</div><div>📊 Participación: {((totalNacional.azul+totalNacional.roja+totalNacional.otros+totalNacional.nulos)/totalNacional.padron*100).toFixed(1)}%</div></div></div>
                        <div className="bg-white rounded-xl shadow-lg p-6"><h3 className="font-bold text-lg">🔎 Resultados LOCALES por Sección</h3><input type="text" placeholder="Número de sección (ej. 1, 9, 35)" className="border p-2 rounded w-full mt-2" value={busquedaLocal} onChange={e => setBusquedaLocal(e.target.value)} />
                        {seccionEncontrada && <div className="mt-4 p-4 bg-gray-50 rounded"><p className="font-bold">Sección {seccionEncontrada.sec} - {seccionEncontrada.nombre}</p><p>Padrón: {seccionEncontrada.padron}</p><div>🔵 AZUL: {seccionEncontrada.cael.azul} | 🔴 ROJA: {seccionEncontrada.cael.roja} | 🟡 AMARILLA: {seccionEncontrada.cael.amarilla} | ⚪ OTROS: {seccionEncontrada.cael.otros} | ❌ NULOS: {seccionEncontrada.cael.nulos}</div><p className="mt-2"><strong>🏆 Ganador Local:</strong> {(()=>{let a=seccionEncontrada.cael.azul, r=seccionEncontrada.cael.roja, am=seccionEncontrada.cael.amarilla, o=seccionEncontrada.cael.otros; if(a>r && a>am && a>o) return "AZUL"; if(r>a && r>am && r>o) return "ROJA"; if(am>a && am>r && am>o) return "AMARILLA"; return "OTROS/EMPATE";})()}</p></div>}
                        {busquedaLocal && !seccionEncontrada && <p className="text-red-500 mt-2">Sección no encontrada</p>}</div>
                    </div>
                )}
                {pestania === "auditoria" && (
                    <div className="bg-white rounded-xl shadow-lg p-5 overflow-x-auto">
                        <h2 className="text-2xl font-bold mb-4">🔍 Auditoría: Triple validación</h2>
                        <div className="mb-8"><h3 className="font-bold text-lg bg-gray-100 p-2 mb-3">🗳️ Elección NACIONAL</h3><table className="min-w-[800px] w-full text-sm border"><thead className="bg-gray-800 text-white"><tr><th className="p-2">Sección</th><th>Actor</th><th>Azul</th><th>Roja</th><th>Otros</th><th>Nulos</th></tr></thead><tbody>{auditoriaNacional.flatMap(row => ([
                            { nombre: "CAEL", data: row.cael }, { nombre: "Azul", data: row.azul }, { nombre: "Roja", data: row.roja }, { nombre: "Observador", data: row.obs }
                        ].map((actor, idx) => <tr key={`${row.sec}-${idx}`} className={idx===0 && row.hay ? "discrep-row" : ""}>{idx===0 && <td rowSpan={4} className="border p-2 align-middle font-bold">{row.nombre}<br/><span className="text-xs">Padrón:{row.padron}</span></td>}<td className="border p-2">{actor.nombre}</td><td className="border p-2 text-center">{actor.data.azul}</td><td className="border p-2 text-center">{actor.data.roja}</td><td className="border p-2 text-center">{actor.data.otros}</td><td className="border p-2 text-center">{actor.data.nulos}</td></tr>)))}</tbody></table></div>
                        <div><h3 className="font-bold text-lg bg-gray-100 p-2 mb-3">🏘️ Elección LOCAL</h3><table className="min-w-[1000px] w-full text-sm border"><thead className="bg-gray-800 text-white"><tr><th className="p-2">Sección</th><th>Actor</th><th>Azul</th><th>Roja</th><th>Amarilla</th><th>Otros</th><th>Nulos</th></tr></thead><tbody>{auditoriaLocal.flatMap(row => ([
                            { nombre: "CAEL", data: row.cael }, { nombre: "Azul", data: row.azul }, { nombre: "Roja", data: row.roja }, { nombre: "Amarilla", data: row.amarilla }, { nombre: "Observador", data: row.obs }
                        ].map((actor, idx) => <tr key={`${row.sec}-${idx}`} className={idx===0 && row.hay ? "discrep-row" : ""}>{idx===0 && <td rowSpan={5} className="border p-2 align-middle font-bold">{row.nombre}<br/><span className="text-xs">Padrón:{row.padron}</span></td>}<td className="border p-2">{actor.nombre}</td><td className="border p-2 text-center">{actor.data.azul||0}</td><td className="border p-2 text-center">{actor.data.roja||0}</td><td className="border p-2 text-center">{actor.data.amarilla||0}</td><td className="border p-2 text-center">{actor.data.otros||0}</td><td className="border p-2 text-center">{actor.data.nulos||0}</td></tr>)))}</tbody></table></div>
                    </div>
                )}
                {pestania === "captura" && sesion && (() => {
                    const esNacional = sesion.tipo === "nacional";
                    const [formVotos, setFormVotos] = React.useState(data[sesion.tipo][sesion.seccion][sesion.perfil === "planilla" ? "planillas" : sesion.perfil][sesion.perfil === "planilla" ? sesion.planilla : ""] || { azul:0, roja:0, amarilla:0, otros:0, nulos:0 });
                    const [errorForm, setErrorForm] = React.useState("");
                    const [exitoMsg, setExitoMsg] = React.useState("");
                    const padronActual = SECCIONES[sesion.seccion]?.padron || 0;
                    const handleChange = (campo, val) => {
                        const num = parseInt(val) || 0;
                        const nuevo = { ...formVotos, [campo]: num };
                        const suma = nuevo.azul + nuevo.roja + (nuevo.amarilla||0) + nuevo.otros + nuevo.nulos;
                        if (suma > padronActual) setErrorForm(`Excede el padrón (${padronActual})`);
                        else setErrorForm("");
                        setFormVotos(nuevo);
                    };
                    const guardar = () => {
                        const suma = formVotos.azul + formVotos.roja + (formVotos.amarilla||0) + formVotos.otros + formVotos.nulos;
                        if (suma > padronActual) return;
                        setData(prev => {
                            const nuevo = { ...prev };
                            if (sesion.perfil === "cael") nuevo[sesion.tipo][sesion.seccion].cael = { ...formVotos };
                            else if (sesion.perfil === "planilla") nuevo[sesion.tipo][sesion.seccion].planillas[sesion.planilla] = { ...formVotos };
                            else nuevo[sesion.tipo][sesion.seccion].observador = { ...formVotos };
                            return nuevo;
                        });
                        setExitoMsg("✅ Guardado");
                        setTimeout(() => setExitoMsg(""), 2000);
                    };
                    return (
                        <div className="bg-white rounded-xl shadow-lg p-6"><div className="flex justify-between border-b pb-2 mb-4"><h2 className="text-xl font-bold">📋 Captura - {esNacional?"NACIONAL":"LOCAL"} - Sección {sesion.seccion}</h2><button onClick={cerrarSesion} className="bg-gray-200 px-3 py-1 rounded">Cerrar</button></div>
                        <div><p><strong>Perfil:</strong> {sesion.perfil} | <strong>Padrón:</strong> {padronActual}</p>
                        <div className="mt-4 space-y-3"><div><label>Azul</label><input type="number" className="w-full border p-2 rounded" value={formVotos.azul||0} onChange={e=>handleChange("azul",e.target.value)} /></div>
                        <div><label>Roja</label><input type="number" className="w-full border p-2 rounded" value={formVotos.roja||0} onChange={e=>handleChange("roja",e.target.value)} /></div>
                        {!esNacional && <div><label>Amarilla</label><input type="number" className="w-full border p-2 rounded" value={formVotos.amarilla||0} onChange={e=>handleChange("amarilla",e.target.value)} /></div>}
                        <div><label>Otros</label><input type="number" className="w-full border p-2 rounded" value={formVotos.otros||0} onChange={e=>handleChange("otros",e.target.value)} /></div>
                        <div><label>Nulos</label><input type="number" className="w-full border p-2 rounded" value={formVotos.nulos||0} onChange={e=>handleChange("nulos",e.target.value)} /></div>
                        {errorForm && <div className="text-red-700 bg-red-50 p-2 rounded">{errorForm}</div>}
                        {exitoMsg && <div className="text-green-700 bg-green-50 p-2 rounded">{exitoMsg}</div>}
                        <button onClick={guardar} className="bg-red-700 text-white px-4 py-2 rounded w-full">Guardar</button></div></div></div>
                    );
                })()}
            </main>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
